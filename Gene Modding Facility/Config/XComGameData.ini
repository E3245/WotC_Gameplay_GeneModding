[XComGame.X2PerkPackages]
+PerkPackage=Gene_Perk_ChaoticMind

[WotC_Gameplay_GeneModding.X2DownloadableContentInfo_WotC_GeneModdingFacility]
DLCIdentifier="WotC_Gameplay_GeneModding"

; For debugging this script module, do not enable unless debugging mod
EnableLogForModule = false

DefaultGeneModOpWorkPerHour = 5

EnableNegativeAbilityOnProjectCancelled = true

HideGeneModIfRequirementsNotMet = true

;
; Amount of days that it takes to get gene modded
;

;GeneModOpDays[0]=20 ;Easy
;GeneModOpDays[1]=20 ;Normal
;GeneModOpDays[2]=30 ;Classic
;GeneModOpDays[3]=30 ;Impossible

; Limits for each category for each Gene mod
+GeneModCategoryLimits = (CategoryName = "GMCat_brain",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_eyes",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_chest",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_skin",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_legs",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_arms",		Limit = 1)
+GeneModCategoryLimits = (CategoryName = "GMCat_none",		Limit = 9999)

; Default Limit for categories not listed above
DefaultGeneModLimit = 9999

IntegratedWarfare_BoostGeneStats = true

;	How much of the soldier's missing health should be restored
;	when the soldier completes a Gene Mod project
;	and the Second Wave Option is enabled.
MUTAGENIC_GROWTH_RESTORE_HEALTH = 1.0f

;
; What classes are not allowed to get gene modded
;
; IF ENABLED, SOLDIERS IN THAT PARTICULAR CLASS WILL NOT BE CONSIDERED WHEN SELECTING A SOLDIER FOR GENE MODDING
;

+DisallowedClasses ="RM_DefaultMecTrooper"
+DisallowedClasses ="RM_ShotgunMecTrooper"
+DisallowedClasses ="RM_SniperMecTrooper"
+DisallowedClasses ="RM_CannonMecTrooper"
+DisallowedClasses ="RM_ReaperMecTrooper"
+DisallowedClasses ="RM_SkirmisherMecTrooper"
+DisallowedClasses ="Spark"
+DisallowedClasses ="ChiefEngineer"

; Colors all abilities granted by Gene mods to this color
AbilityGeneModIconColor = "53b45e";